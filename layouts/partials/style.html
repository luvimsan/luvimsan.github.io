<style>
  :root {
    --width: 860px;
    --font-main: Georgia, "Times New Roman", Times, serif;
    --font-secondary: Georgia, "Times New Roman", Times, serif;
    /* --font-main: Verdana, sans-serif; */
    /* --font-secondary: Verdana, sans-serif; */
    --font-scale: 1.1em;
    --background-color: #fff;
    --heading-color: #222;
    --text-color: #444;
    --link-color: #3273dc;
    --visited-color: #8b6fcb;
    --blockquote-color: #222;
  }

  @font-face {
      font-family: 'Leckerli One';
      font-style: normal;
      font-weight: 400;
      font-display: block;
      src: url('/fonts/leckerli.woff2') format('woff2');
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --background-color: #151515;
      --heading-color: #eee;
      --text-color: #ddd;
      --link-color: #8cc2dd;
      --blockquote-color: #ccc;
    }
  }

  body {
    font-family: var(--font-secondary);
    font-size: var(--font-scale);
    margin: auto;
    padding: 20px;
    max-width: var(--width);
    text-align: left;
    background-color: var(--background-color);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.6;
    color: var(--text-color);
  }

  h1,
  h2,
  h3,
  h4,
  h5,
  h6 {
    font-family: var(--font-main);
    color: var(--heading-color);
    margin-bottom: 0.2em !important;
  }

  h2, h3, h4 {
      margin-top: 0.0em !important;
  }

  a {
    color: var(--link-color);
    cursor: pointer;
    text-decoration: none;
  }

  a:hover {
    text-decoration: underline;
  }

  nav a {
    margin-right: 8px;
  }

  strong,
  b {
    color: var(--heading-color);
  }

  button {
    margin: 0;
    cursor: pointer;
  }

  time {
    font-family: monospace;
    font-style: normal;
    font-size: 15px;
  }

  main {
    line-height: 1.6;
    margin-bottom: 0.5rem;
    line-height: 1.2;
  }

  table {
    width: 100%;
  }

  hr {
    border: 0;
    border-top: 1px dashed;
  }

  img {
    max-width: 100%;
  }

  code {
    font-family: monospace;
    padding: 2px;
    border-radius: 3px;
    text-color: #ddd;
  }

  blockquote {
    border-left: 1px solid #999;
    color: var(--blockquote-color);
    padding-left: 20px;
    font-style: italic;
  }

  footer {
    padding: 25px 0;
    text-align: center;
  }

  .title:hover {
    text-decoration: none;
  }

  .title h1 {
    font-size: 1.5em;
  }

  .inline {
    width: auto !important;
  }

  .highlight,
  .code {
    border-radius: 3px;
    margin-block-start: 1em;
    margin-block-end: 1em;
    overflow-x: auto;
  }

  .highlight pre,
  .code pre {
    min-width: 100%;
    width: max-content;
  }

  /* blog post list */
  ul.blog-posts {
    list-style-type: none;
    padding: unset;
  }

  ul.blog-posts li {
    display: flex;
    margin-bottom: 0.8rem !important;
  }

    ul.blog-posts li div + div {
        margin-top: -0.2rem;
    }

  ul.blog-posts li span {
    flex: 0 0 130px;
  }

  ul.blog-posts li a:visited {
    color: var(--link-color);
  }

  /* tigthen the vertical space in the bullet points*/
  main ul li, main ol li {
    margin-top: 0.2rem !important;
    margin-bottom: 0.2rem !important;
  }

  main ul li p, main ol li p {
    margin: 0 !important;
  }

  .title {
      display: inline-flex;
      align-items: baseline;
      gap: 12px;
      text-decoration: none;
  }

  .title-logo {
      height: 1.5em;
      width: auto;
      display: block;
  }

  .title-text {
      margin: 0;
      display: inline-flex;
      align-items: baseline;
      font-family: 'Leckerli One', cursive;
      font-size: 1.25em;
      font-weight: 400;
      letter-spacing: 0.08em;
  }

  .char-l {
      color: #5b9ebc;
      font-size: 1.6em;
      margin-right: -0.1em;
      line-height: 0.9;
  }

  .split-w {
      display: inline-flex;
      align-items: baseline;
  }

  .char-v-left {
      color: #5b9ebc;
      font-size: 1.2em;
      margin-right: -0.22em;
      line-height: 0.9;
  }

  .char-v-right {
      font-size: 1.2em;
      line-height: 0.9;
  }

</style>
